name: Continuous Integration

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: "x86_64-linux", host: "" }
          - { name: "aarch64-linux", host: "--host=aarch64-linux-gnu" }

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config \
          libssl-dev libevent-dev libboost-all-dev libdb-dev libdb++-dev libsqlite3-dev \
          qtbase5-dev qttools5-dev-tools libqt5gui5 libqt5core5a libqt5dbus5 \
          g++-aarch64-linux-gnu

      - name: Build
        run: |
          ./autogen.sh
          ./configure ${{ matrix.target.host }} --with-gui=qt5 --disable-tests --disable-bench CXXFLAGS="-std=c++14"
          make -j$(nproc)

      - name: Collect Binaries
        run: |
          mkdir -p release_binaries
          cp src/termucoind release_binaries/termucoind || true
          cp src/termucoin-cli release_binaries/termucoin-cli || true
          cp src/termucoin-tx release_binaries/termucoin-tx || true
          cp src/qt/termucoin-qt release_binaries/termucoin-qt || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termucoin-binaries-${{ matrix.target.name }}
          path: release_binaries/
