description "Termucoin Core Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env TERMUCOIND_BIN="/usr/bin/termucoind"
env TERMUCOIND_USER="termucoin"
env TERMUCOIND_GROUP="termucoin"
env TERMUCOIND_PIDDIR="/var/run/termucoind"
# upstart can't handle variables constructed with other variables
env TERMUCOIND_PIDFILE="/var/run/termucoind/termucoind.pid"
env TERMUCOIND_CONFIGFILE="/etc/termucoin/termucoin.conf"
env TERMUCOIND_DATADIR="/var/lib/termucoind"

expect fork

respawn
respawn limit 5 120
kill timeout 60

pre-start script
    # this will catch non-existent config files
    # termucoind will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$TERMUCOIND_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run termucoind."
        echo "The setting must appear in $TERMUCOIND_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following"
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is also recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"Termucoin Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$TERMUCOIND_PIDDIR"
    chmod 0755 "$TERMUCOIND_PIDDIR"
    chown $TERMUCOIND_USER:$TERMUCOIND_GROUP "$TERMUCOIND_PIDDIR"
    chown $TERMUCOIND_USER:$TERMUCOIND_GROUP "$TERMUCOIND_CONFIGFILE"
    chmod 0660 "$TERMUCOIND_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$TERMUCOIND_PIDFILE" \
    --chuid $TERMUCOIND_USER:$TERMUCOIND_GROUP \
    --exec "$TERMUCOIND_BIN" \
    -- \
    -pid="$TERMUCOIND_PIDFILE" \
    -conf="$TERMUCOIND_CONFIGFILE" \
    -datadir="$TERMUCOIND_DATADIR" \
    -disablewallet \
    -daemon

